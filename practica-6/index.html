<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈ Airport Explorer</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }

    .badge {
      font-size: 0.75rem;
      background: #0ea5e9;
      color: #fff;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }

    .spacer { flex: 1; }

    /* ── Panels ── */
    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #334155;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      font-size: 0.78rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
    }

    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px; }
    .tab-content.active { display: flex; flex-direction: column; gap: 10px; }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.72rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; }

    input, select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e2e8f0;
      font-size: 0.84rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #38bdf8; }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-danger:hover { opacity: 0.88; }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

    /* ── Popular list ── */
    .popular-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .popular-item:hover { border-color: #38bdf8; }
    .popular-rank {
      font-size: 0.7rem;
      font-weight: 700;
      color: #f59e0b;
      min-width: 20px;
    }
    .popular-info { flex: 1; min-width: 0; }
    .popular-iata { font-weight: 700; color: #38bdf8; font-size: 0.9rem; }
    .popular-name { font-size: 0.72rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .popular-visits {
      font-size: 0.72rem;
      background: #1d4ed8;
      color: #bfdbfe;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Nearby controls ── */
    .nearby-result {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .nearby-result:hover { border-color: #22c55e; }
    .nearby-iata { font-weight: 700; color: #22c55e; }
    .nearby-dist { font-size: 0.72rem; color: #94a3b8; }

    /* ── Status bar ── */
    #status {
      padding: 6px 14px;
      font-size: 0.72rem;
      color: #64748b;
      border-top: 1px solid #334155;
      background: #1e293b;
    }
    #status.ok  { color: #22c55e; }
    #status.err { color: #f87171; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Leaflet popup custom ── */
    .ap-popup h3 { color: #0ea5e9; margin-bottom: 6px; font-size: 1rem; }
    .ap-popup table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
    .ap-popup td { padding: 2px 6px; }
    .ap-popup td:first-child { color: #64748b; font-weight: 600; }
    .ap-popup .del-btn {
      margin-top: 8px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ── Search bar in header ── */
    #header-search {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.82rem;
      width: 180px;
    }
  </style>
</head>
<body>

<header>
  <h1>✈ Airport Explorer</h1>
  <span class="badge" id="total-badge">Loading…</span>
  <div class="spacer"></div>
  <input id="header-search" type="text" placeholder="Jump to IATA code…" />
</header>

<div class="panels">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="add">➕ Add</button>
      <button class="tab-btn" data-tab="nearby">📍 Nearby</button>
      <button class="tab-btn" data-tab="popular">🔥 Popular</button>
    </div>

    <!-- ADD AIRPORT TAB -->
    <div class="tab-content active" id="tab-add">
      <div class="form-group">
        <label>IATA Code *</label>
        <input id="f-iata" type="text" maxlength="3" placeholder="e.g. EZE" />
      </div>
      <div class="form-group">
        <label>Airport Name *</label>
        <input id="f-name" type="text" placeholder="Ezeiza Intl" />
      </div>
      <div class="form-group">
        <label>City *</label>
        <input id="f-city" type="text" placeholder="Buenos Aires, Argentina" />
      </div>
      <div class="form-group">
        <label>ICAO</label>
        <input id="f-icao" type="text" maxlength="4" placeholder="SAEZ" />
      </div>
      <div class="form-group">
        <label>Latitude *</label>
        <input id="f-lat" type="number" step="any" placeholder="-34.8222" />
      </div>
      <div class="form-group">
        <label>Longitude *</label>
        <input id="f-lng" type="number" step="any" placeholder="-58.5358" />
      </div>
      <div class="form-group">
        <label>Altitude (ft)</label>
        <input id="f-alt" type="number" placeholder="67" />
      </div>
      <div class="form-group">
        <label>Timezone</label>
        <input id="f-tz" type="text" placeholder="America/Argentina/Buenos_Aires" />
      </div>
      <button class="btn btn-primary" id="btn-add">Add Airport</button>
      <div id="add-msg" style="font-size:0.78rem; color:#94a3b8;"></div>
    </div>

    <!-- NEARBY TAB -->
    <div class="tab-content" id="tab-nearby">
      <p style="font-size:0.78rem; color:#64748b;">Click the map to set your position, or enter manually.</p>
      <div class="form-group">
        <label>Latitude</label>
        <input id="n-lat" type="number" step="any" placeholder="-34.82" />
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input id="n-lng" type="number" step="any" placeholder="-58.53" />
      </div>
      <div class="form-group">
        <label>Radius (km)</label>
        <input id="n-radius" type="number" value="500" min="1" />
      </div>
      <button class="btn btn-primary" id="btn-nearby">Search Nearby</button>
      <div id="nearby-results" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- POPULAR TAB -->
    <div class="tab-content" id="tab-popular">
      <button class="btn btn-primary btn-sm" id="btn-refresh-pop">↻ Refresh</button>
      <div id="popular-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<div id="status">Ready. Waiting for data…</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = '/api';   // proxied through nginx → backend:8000

// ── Map setup ───────────────────────────────────────────────────────────────
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 60,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  chunkedLoading: true,
});
map.addLayer(clusterGroup);

// Custom plane icon
const planeIcon = L.divIcon({
  html: '✈',
  className: '',
  iconSize: [20, 20],
  iconAnchor: [10, 10],
  popupAnchor: [0, -10],
});

// ── State ────────────────────────────────────────────────────────────────────
let allMarkers = {};   // iata → L.Marker
let nearbyCircle = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

    if (btn.dataset.tab === 'popular') loadPopular();
  });
});

// ── Load all airports ─────────────────────────────────────────────────────────
async function loadAllAirports() {
  setStatus('Loading airports…');
  try {
    const airports = await apiFetch('/airports');
    clusterGroup.clearLayers();
    allMarkers = {};

    airports.forEach(ap => addMarkerToMap(ap));

    document.getElementById('total-badge').textContent = `${airports.length} airports`;
    setStatus(`Loaded ${airports.length} airports.`, 'ok');
  } catch (e) {
    setStatus('Error loading airports: ' + e.message, 'err');
  }
}

function addMarkerToMap(ap) {
  if (!ap.lat || !ap.lng) return;
  const marker = L.marker([ap.lat, ap.lng], { icon: planeIcon });
  marker.on('click', () => openAirportPopup(ap.iata_faa, marker));
  clusterGroup.addLayer(marker);
  allMarkers[ap.iata_faa] = marker;
}

// ── Airport popup ─────────────────────────────────────────────────────────────
async function openAirportPopup(iata, marker) {
  setStatus(`Fetching ${iata}…`);
  try {
    // GET /airports/{iata} → triggers popularity +1 on backend
    const ap = await apiFetch(`/airports/${iata}`);

    const html = `
      <div class="ap-popup">
        <h3>✈ ${ap.iata_faa}</h3>
        <table>
          <tr><td>Name</td><td>${ap.name}</td></tr>
          <tr><td>City</td><td>${ap.city}</td></tr>
          <tr><td>ICAO</td><td>${ap.icao || '—'}</td></tr>
          <tr><td>Lat / Lng</td><td>${ap.lat}, ${ap.lng}</td></tr>
          <tr><td>Altitude</td><td>${ap.alt != null ? ap.alt + ' ft' : '—'}</td></tr>
          <tr><td>Timezone</td><td>${ap.tz || '—'}</td></tr>
        </table>
        <button class="del-btn" onclick="deleteAirport('${ap.iata_faa}')">🗑 Delete</button>
      </div>`;

    marker.bindPopup(html, { maxWidth: 260 }).openPopup();
    setStatus(`Loaded ${ap.iata_faa} · visit counted ✔`, 'ok');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
}

// ── Delete airport ────────────────────────────────────────────────────────────
async function deleteAirport(iata) {
  if (!confirm(`Delete airport ${iata}?`)) return;
  try {
    await apiFetch(`/airports/${iata}`, { method: 'DELETE' });
    const marker = allMarkers[iata];
    if (marker) {
      clusterGroup.removeLayer(marker);
      delete allMarkers[iata];
    }
    map.closePopup();
    setStatus(`Deleted ${iata}.`, 'ok');
    const badge = document.getElementById('total-badge');
    badge.textContent = `${Object.keys(allMarkers).length} airports`;
  } catch (e) {
    setStatus('Delete failed: ' + e.message, 'err');
  }
}

// ── Add airport form ──────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', async () => {
  const iata = document.getElementById('f-iata').value.trim().toUpperCase();
  const name = document.getElementById('f-name').value.trim();
  const city = document.getElementById('f-city').value.trim();
  const icao = document.getElementById('f-icao').value.trim().toUpperCase() || null;
  const lat  = parseFloat(document.getElementById('f-lat').value);
  const lng  = parseFloat(document.getElementById('f-lng').value);
  const alt  = document.getElementById('f-alt').value ? parseFloat(document.getElementById('f-alt').value) : null;
  const tz   = document.getElementById('f-tz').value.trim() || null;

  const msg = document.getElementById('add-msg');

  if (!iata || !name || !city || isNaN(lat) || isNaN(lng)) {
    msg.textContent = '⚠ IATA, Name, City, Lat and Lng are required.';
    msg.style.color = '#f87171';
    return;
  }

  try {
    const ap = await apiFetch('/airports', {
      method: 'POST',
      body: JSON.stringify({ iata_faa: iata, name, city, icao, lat, lng, alt, tz }),
    });
    addMarkerToMap(ap);
    msg.textContent = `✔ ${iata} added successfully!`;
    msg.style.color = '#22c55e';
    setStatus(`Airport ${iata} created.`, 'ok');
    // Clear form
    ['f-iata','f-name','f-city','f-icao','f-lat','f-lng','f-alt','f-tz'].forEach(id => {
      document.getElementById(id).value = '';
    });
  } catch (e) {
    msg.textContent = '✘ ' + e.message;
    msg.style.color = '#f87171';
  }
});

// ── Nearby search ─────────────────────────────────────────────────────────────
document.getElementById('btn-nearby').addEventListener('click', async () => {
  const lat    = parseFloat(document.getElementById('n-lat').value);
  const lng    = parseFloat(document.getElementById('n-lng').value);
  const radius = parseFloat(document.getElementById('n-radius').value) || 500;
  const resultsEl = document.getElementById('nearby-results');

  if (isNaN(lat) || isNaN(lng)) {
    setStatus('Enter valid lat/lng for nearby search.', 'err');
    return;
  }

  // Draw circle on map
  if (nearbyCircle) map.removeLayer(nearbyCircle);
  nearbyCircle = L.circle([lat, lng], {
    radius: radius * 1000,
    color: '#22c55e',
    fillColor: '#22c55e',
    fillOpacity: 0.07,
    weight: 1.5,
  }).addTo(map);
  map.setView([lat, lng], Math.max(3, 10 - Math.log2(radius)));

  try {
    setStatus('Searching nearby airports…');
    const airports = await apiFetch(`/airports/nearby?lat=${lat}&lng=${lng}&radius_km=${radius}`);
    resultsEl.innerHTML = '';

    if (!airports.length) {
      resultsEl.innerHTML = '<p style="color:#64748b;font-size:0.8rem;">No airports found.</p>';
      setStatus('No airports found nearby.', 'err');
      return;
    }

    airports.forEach(ap => {
      const div = document.createElement('div');
      div.className = 'nearby-result';
      div.innerHTML = `
        <div class="nearby-iata">${ap.iata_faa}</div>
        <div style="font-size:0.8rem;">${ap.name}</div>
        <div class="nearby-dist">📏 ${ap.distance_km} km away</div>`;
      div.addEventListener('click', () => {
        const marker = allMarkers[ap.iata_faa];
        if (marker) {
          map.setView(marker.getLatLng(), 10);
          openAirportPopup(ap.iata_faa, marker);
        }
      });
      resultsEl.appendChild(div);
    });
    setStatus(`Found ${airports.length} airports within ${radius} km.`, 'ok');
  } catch (e) {
    setStatus('Nearby search failed: ' + e.message, 'err');
  }
});

// Click map → set nearby coords
map.on('click', e => {
  const activeTab = document.querySelector('.tab-btn.active')?.dataset?.tab;
  if (activeTab === 'nearby') {
    document.getElementById('n-lat').value = e.latlng.lat.toFixed(5);
    document.getElementById('n-lng').value = e.latlng.lng.toFixed(5);
  }
});

// ── Popular airports ──────────────────────────────────────────────────────────
async function loadPopular() {
  const listEl = document.getElementById('popular-list');
  listEl.innerHTML = '<p style="color:#64748b;font-size:0.8rem;">Loading…</p>';
  try {
    const airports = await apiFetch('/airports/popular?limit=15');
    listEl.innerHTML = '';

    if (!airports.length) {
      listEl.innerHTML = '<p style="color:#64748b;font-size:0.8rem;">No data yet. Click some airports!</p>';
      return;
    }

    airports.forEach((ap, i) => {
      const div = document.createElement('div');
      div.className = 'popular-item';
      div.innerHTML = `
        <span class="popular-rank">#${i + 1}</span>
        <div class="popular-info">
          <div class="popular-iata">${ap.iata_faa}</div>
          <div class="popular-name">${ap.name}</div>
        </div>
        <span class="popular-visits">${ap.visits} visit${ap.visits !== 1 ? 's' : ''}</span>`;
      div.addEventListener('click', () => {
        const marker = allMarkers[ap.iata_faa];
        if (marker) {
          clusterGroup.zoomToShowLayer(marker, () => {
            openAirportPopup(ap.iata_faa, marker);
          });
        }
      });
      listEl.appendChild(div);
    });
  } catch (e) {
    listEl.innerHTML = `<p style="color:#f87171;font-size:0.78rem;">${e.message}</p>`;
  }
}

document.getElementById('btn-refresh-pop').addEventListener('click', loadPopular);

// ── Header search ─────────────────────────────────────────────────────────────
document.getElementById('header-search').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const iata = e.target.value.trim().toUpperCase();
  if (!iata) return;

  const marker = allMarkers[iata];
  if (marker) {
    clusterGroup.zoomToShowLayer(marker, () => {
      openAirportPopup(iata, marker);
    });
  } else {
    setStatus(`Airport ${iata} not found on map.`, 'err');
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadAllAirports();
</script>
</body>
</html>
